<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1688分销选品系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: #fff; border-radius: 16px; padding: 60px 80px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center; }
        h1 { font-size: 32px; color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 40px; }
        .features { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 40px; }
        .feature { padding: 20px; background: #f8f9fa; border-radius: 8px; text-align: left; }
        .feature h3 { color: #ff6a00; font-size: 16px; margin-bottom: 8px; }
        .feature p { color: #666; font-size: 14px; }
        .btn { display: inline-block; padding: 14px 40px; background: #ff6a00; color: #fff; text-decoration: none; border-radius: 8px; font-size: 16px; margin: 5px; }
        .btn:hover { opacity: 0.9; }
        .btn-secondary { background: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1>1688分销选品系统</h1>
        <p class="subtitle">通过钉钉机器人快速选品，一键上架到您的商城</p>
        
        <div class="features">
            <div class="feature">
                <h3>🔍 智能搜索</h3>
                <p>通过钉钉发送指令，自动从1688搜索商品</p>
            </div>
            <div class="feature">
                <h3>📋 选品管理</h3>
                <p>可视化选品页面，支持筛选、勾选、导出</p>
            </div>
            <div class="feature">
                <h3>💰 智能定价</h3>
                <p>自动计算成本+15%-20%的建议售价</p>
            </div>
            <div class="feature">
                <h3>📦 产品库</h3>
                <p>管理待上架和已上架产品</p>
            </div>
        </div>
        
        <div>
            <a href="/products" class="btn">产品库</a>
            <a href="https://www.dingtalk.com" class="btn btn-secondary" target="_blank">钉钉机器人</a>
        </div>
    </div>
</body>
</html>
